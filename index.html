<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lazy Clicker</title>

<style>
  html, body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: sans-serif;
    height: 100%;
    touch-action: manipulation;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .container { width: 100%; max-width: 320px; }

  .score { font-size: 36px; margin: 10px 0; }

  button {
    width: 100%;
    padding: 16px;
    margin: 6px 0;
    border-radius: 10px;
    border: none;
    font-size: 15px;
  }

  .tap { background: #fff; color: #000; }

  .upgrade {
    background: #111;
    color: #fff;
    border: 1px solid #fff;
  }

  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
  }

  .box {
    border: 1px solid #fff;
    padding: 20px;
    width: 260px;
  }

  .box button {
    background: #fff;
    color: #000;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="score" id="score">0</div>

  <button class="tap" id="tapBtn">TAP</button>

  <button class="upgrade" id="clickUp"></button>
  <button class="upgrade" id="autoUp"></button>
  <button class="upgrade" id="multiUp"></button>
</div>

<div class="modal" id="modal">
  <div class="box">
    <div id="offlineText"></div>
    <button onclick="closeModal()">ok</button>
  </div>
</div>

<script>
let score = 0;
let perClick = 1;
let auto = 0;
let multi = 1;

let clickLvl = 0;
let autoLvl = 0;
let multiLvl = 0;

const scoreEl = document.getElementById("score");

function cost(base, lvl, scale){
  return Math.floor(base * Math.pow(scale, lvl));
}

/* LOAD */
function load(){
  const save = JSON.parse(localStorage.getItem("clicker"));

  if(save){
    score = save.score || 0;
    perClick = save.perClick || 1;
    auto = save.auto || 0;
    multi = save.multi || 1;

    clickLvl = save.clickLvl || 0;
    autoLvl = save.autoLvl || 0;
    multiLvl = save.multiLvl || 0;
  }

  const last = localStorage.getItem("lastTime");
  if(last){
    const diff = (Date.now() - Number(last)) / 1000;
    const hours = Math.min(diff / 3600, 8);

    const earned = Math.floor(hours * auto * 60 * multi);

    if(earned > 0){
      score += earned;
      showOffline(earned);
    }
  }
}

/* SAVE */
function save(){
  localStorage.setItem("clicker", JSON.stringify({
    score, perClick, auto, multi,
    clickLvl, autoLvl, multiLvl
  }));

  localStorage.setItem("lastTime", Date.now());
}

/* UI */
function update(){
  scoreEl.innerText = Math.floor(score);

  clickUp.innerText = "+tap (" + cost(10,clickLvl,1.4) + ")";
  autoUp.innerText = "+auto (" + cost(25,autoLvl,1.5) + ")";
  multiUp.innerText = "x multi (" + cost(50,multiLvl,1.6) + ")";
}

/* GAME */
function tap(){
  score += perClick * multi;
  update(); save();
}

function buyClick(){
  let c = cost(10,clickLvl,1.4);
  if(score >= c){
    score -= c;
    perClick++;
    clickLvl++;
    update(); save();
  }
}

function buyAuto(){
  let c = cost(25,autoLvl,1.5);
  if(score >= c){
    score -= c;
    auto += 0.5;
    autoLvl++;
    update(); save();
  }
}

function buyMulti(){
  let c = cost(50,multiLvl,1.6);
  if(score >= c){
    score -= c;
    multi += 0.2;
    multiLvl++;
    update(); save();
  }
}

/* OFFLINE POPUP */
function showOffline(amount){
  document.getElementById("offlineText").innerText =
    "offline earnings: +" + amount;

  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* EVENTS */
tapBtn.onpointerdown = tap;
clickUp.onpointerdown = buyClick;
autoUp.onpointerdown = buyAuto;
multiUp.onpointerdown = buyMulti;

/* AUTO */
setInterval(()=>{
  score += auto * multi;
  update(); save();
},1000);

/* START */
load();
update();
</script>

</body>
</html>
