<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Minimal Clicker</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: sans-serif;
    height: 100%;
    touch-action: manipulation;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .container {
    width: 100%;
    max-width: 300px;
  }

  h1 {
    font-size: 20px;
    margin-bottom: 20px;
  }

  .score {
    font-size: 32px;
    margin: 20px 0;
  }

  button {
    width: 100%;
    padding: 20px;
    font-size: 18px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 10px;
    margin-bottom: 10px;
    touch-action: manipulation;
  }

  button:active {
    opacity: 0.7;
  }

  .upgrade {
    background: #111;
    color: #fff;
    border: 1px solid #fff;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Clicker</h1>
  <div class="score" id="score">0</div>
  <button onclick="clickScore()">TAP</button>
  <button class="upgrade" onclick="buyUpgrade()">+1 per click (10)</button>
</div>

<script>
  let score = 0;
  let perClick = 1;
  let upgradeCost = 10;

  // ===== ZOOM FIX =====
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function (event) {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) {
      event.preventDefault(); // kills double-tap zoom
    }
    lastTouchEnd = now;
  }, false);

  document.addEventListener('gesturestart', function (e) {
    e.preventDefault(); // kills pinch zoom (iOS)
  });

  // ===== SAVE / LOAD =====
  function loadGame() {
    const save = JSON.parse(localStorage.getItem("clickerSave"));
    if (save) {
      score = save.score || 0;
      perClick = save.perClick || 1;
      upgradeCost = save.upgradeCost || 10;
    }
  }

  function saveGame() {
    localStorage.setItem("clickerSave", JSON.stringify({
      score,
      perClick,
      upgradeCost
    }));
  }

  function updateUI() {
    document.getElementById("score").innerText = score;
    document.querySelector(".upgrade").innerText =
      "+" + perClick + " per click (" + upgradeCost + ")";
  }

  function clickScore() {
    score += perClick;
    updateUI();
    saveGame();
  }

  function buyUpgrade() {
    if (score >= upgradeCost) {
      score -= upgradeCost;
      perClick++;
      upgradeCost = Math.floor(upgradeCost * 1.5);
      updateUI();
      saveGame();
    }
  }

  loadGame();
  updateUI();
</script>

</body>
</html>
