<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lazy Clicker</title>
<style>
  html, body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: sans-serif;
    height: 100%;
    touch-action: manipulation;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .container {
    width: 100%;
    max-width: 320px;
  }

  .score {
    font-size: 36px;
    margin: 10px 0;
  }

  .tutorial {
    font-size: 13px;
    opacity: 0.7;
    margin-bottom: 15px;
  }

  button {
    width: 100%;
    padding: 16px;
    margin: 6px 0;
    border: none;
    border-radius: 10px;
    font-size: 15px;
  }

  .tap {
    background: #fff;
    color: #000;
  }

  .upgrade {
    background: #111;
    color: #fff;
    border: 1px solid #fff;
  }
</style>
</head>
<body>

<div class="container">
  <div class="score" id="score">0</div>
  <div class="tutorial" id="tutorial">tap. get number. don’t overthink it.</div>

  <button class="tap" id="tapBtn">TAP</button>

  <button class="upgrade" id="clickUpgrade"></button>
  <button class="upgrade" id="autoUpgrade"></button>
  <button class="upgrade" id="multiUpgrade"></button>
</div>

<script>
  let score = 0;
  let perClick = 1;
  let auto = 0;
  let multi = 1;

  let clickLvl = 0;
  let autoLvl = 0;
  let multiLvl = 0;

  function cost(base, lvl, scale) {
    return Math.floor(base * Math.pow(scale, lvl));
  }

  function load() {
    const s = JSON.parse(localStorage.getItem("lazyClicker"));
    if (s) Object.assign(window, s);
  }

  function save() {
    localStorage.setItem("lazyClicker", JSON.stringify({
      score, perClick, auto, multi,
      clickLvl, autoLvl, multiLvl
    }));
  }

  function update() {
    document.getElementById("score").innerText = Math.floor(score);

    document.getElementById("clickUpgrade").innerText =
      "+tap power (" + cost(10, clickLvl, 1.4) + ")";

    document.getElementById("autoUpgrade").innerText =
      "+auto (" + cost(25, autoLvl, 1.5) + ")";

    document.getElementById("multiUpgrade").innerText =
      "x multiplier (" + cost(50, multiLvl, 1.6) + ")";
  }

  function tap() {
    score += perClick * multi;
    update();
    save();
  }

  function buyClick() {
    let c = cost(10, clickLvl, 1.4);
    if (score >= c) {
      score -= c;
      perClick += 1;
      clickLvl++;
      update();
      save();
    }
  }

  function buyAuto() {
    let c = cost(25, autoLvl, 1.5);
    if (score >= c) {
      score -= c;
      auto += 0.5;
      autoLvl++;
      update();
      save();
    }
  }

  function buyMulti() {
    let c = cost(50, multiLvl, 1.6);
    if (score >= c) {
      score -= c;
      multi += 0.2;
      multiLvl++;
      update();
      save();
    }
  }

  // auto income
  setInterval(() => {
    score += auto * multi;
    update();
    save();
  }, 1000);

  // tutorial changes slightly
  function tutorialUpdate() {
    if (score > 20) {
      document.getElementById("tutorial").innerText = "ok now buy something";
    }
    if (score > 100) {
      document.getElementById("tutorial").innerText = "yeah… this is your life now";
    }
  }

  setInterval(tutorialUpdate, 1000);

  document.getElementById("tapBtn").addEventListener("pointerdown", tap);
  document.getElementById("clickUpgrade").addEventListener("pointerdown", buyClick);
  document.getElementById("autoUpgrade").addEventListener("pointerdown", buyAuto);
  document.getElementById("multiUpgrade").addEventListener("pointerdown", buyMulti);

  load();
  update();
</script>

</body>
</html>
