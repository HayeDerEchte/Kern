<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ugly Pro Editor</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: monospace;
    background: #cfcfcf;
}

/* 16:9 Canvas Wrapper */
#wrap {
    position: absolute;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

canvas {
    background: white;
    aspect-ratio: 16 / 9;
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
    border: 2px solid #000;
}

/* UI */
.toolbar {
    position: fixed;
    top: 0;
    left: 0;
    background: #bdbdbd;
    border: 2px solid #888;
    padding: 4px;
}

button {
    font-size: 12px;
    padding: 4px;
}

.menu {
    position: fixed;
    top: 28px;
    left: 0;
    background: #d0d0d0;
    border: 2px solid #888;
    display: none;
    flex-direction: column;
}

.menu button { width:120px; text-align:left; }

.warning {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: red;
    color: white;
    font-size: 12px;
    text-align: center;
}
@media (orientation: landscape){ .warning{display:none;} }
</style>
</head>
<body>

<div class="toolbar">
    <button onclick="toggleMenu()">＋ Add</button>
</div>

<div class="menu" id="menu">
    <button onclick="addRect()">▭</button>
    <button onclick="addCircle()">◯</button>
    <button onclick="imgInput.click()">🖼</button>
</div>

<div class="warning">TURN DEVICE</div>

<div id="wrap">
<canvas id="canvas"></canvas>
</div>

<input type="file" id="imgInput" style="display:none">

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let objects=[], selected=null, drag=false, handle=null;

function resize(){ /* canvas CSS handles ratio */ }
window.onresize=resize;

/* Add */
function addRect(){ objects.push({type:"rect",x:100,y:100,w:120,h:80}); draw(); }
function addCircle(){ objects.push({type:"circle",x:150,y:150,r:50}); draw(); }

imgInput.onchange=e=>{
    let img=new Image();
    img.onload=()=>{
        // ORIGINAL RATIO FIX
        let scale=120/img.width;
        objects.push({
            type:"img",
            img,
            x:80,y:80,
            w:img.width*scale,
            h:img.height*scale,
            ratio:img.width/img.height
        });
        draw();
    };
    img.src=URL.createObjectURL(e.target.files[0]);
};

/* Menu */
function toggleMenu(){
    let m=document.getElementById("menu");
    m.style.display=m.style.display==="flex"?"none":"flex";
}

/* Draw */
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    objects.forEach(o=>{
        ctx.fillStyle="#aaa";

        if(o.type==="rect") ctx.fillRect(o.x,o.y,o.w,o.h);

        if(o.type==="circle"){
            ctx.beginPath();
            ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
            ctx.fill();
        }

        if(o.type==="img"){
            ctx.drawImage(o.img,o.x,o.y,o.w,o.h);
        }

        if(o===selected) drawHandles(o);
    });
}

/* Handles */
function drawHandles(o){
    ctx.fillStyle="black";
    getHandles(o).forEach(h=>{
        ctx.fillRect(h.x-4,h.y-4,8,8);
    });
}

function getHandles(o){
    if(o.type==="circle"){
        return [{x:o.x+o.r,y:o.y}];
    }
    return [
        {x:o.x,y:o.y,corner:true},
        {x:o.x+o.w,y:o.y,corner:true},
        {x:o.x,y:o.y+o.h,corner:true},
        {x:o.x+o.w,y:o.y+o.h,corner:true}
    ];
}

/* Input */
function pos(e){
    let r=canvas.getBoundingClientRect();
    let t=e.touches?e.touches[0]:e;
    return {
        x:(t.clientX-r.left)*(canvas.width/r.width),
        y:(t.clientY-r.top)*(canvas.height/r.height)
    };
}

canvas.onmousedown=start;
canvas.onmousemove=move;
canvas.onmouseup=end;

canvas.ontouchstart=start;
canvas.ontouchmove=move;
canvas.ontouchend=end;

function start(e){
    let p=pos(e);
    selected=null; handle=null;

    for(let o of [...objects].reverse()){
        for(let h of getHandles(o)){
            if(Math.abs(p.x-h.x)<10 && Math.abs(p.y-h.y)<10){
                selected=o; handle=h; return;
            }
        }

        if(o.type==="rect"||o.type==="img"){
            if(p.x>o.x&&p.x<o.x+o.w&&p.y>o.y&&p.y<o.y+o.h){
                selected=o; drag=true; return;
            }
        }

        if(o.type==="circle"){
            let dx=p.x-o.x, dy=p.y-o.y;
            if(Math.sqrt(dx*dx+dy*dy)<o.r){
                selected=o; drag=true; return;
            }
        }
    }
}

function move(e){
    if(!selected) return;
    let p=pos(e);

    if(handle){
        if(selected.type==="img"){
            // PROPORTIONAL ONLY (NO STRETCH EVER)
            let newW = p.x - selected.x;
            selected.w = newW;
            selected.h = newW / selected.ratio;
        }
        else if(selected.type==="rect"){
            selected.w = p.x - selected.x;
            selected.h = p.y - selected.y;
        }
        else if(selected.type==="circle"){
            selected.r = Math.abs(p.x-selected.x);
        }
    }
    else if(drag){
        if(selected.type==="circle"){
            selected.x=p.x; selected.y=p.y;
        } else {
            selected.x=p.x-selected.w/2;
            selected.y=p.y-selected.h/2;
        }
    }

    draw();
}

function end(){
    drag=false;
    handle=null;
}

draw();
</script>

</body>
</html>
