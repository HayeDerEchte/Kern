<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Clicker</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: #000;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
  }

  .container {
    width: 100%;
    max-width: 300px;
  }

  h1 {
    font-size: 20px;
    margin-bottom: 20px;
  }

  .score {
    font-size: 32px;
    margin: 20px 0;
  }

  button {
    width: 100%;
    padding: 20px;
    font-size: 18px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  button:active {
    opacity: 0.7;
  }

  .upgrade {
    background: #111;
    color: #fff;
    border: 1px solid #fff;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Clicker</h1>
  <div class="score" id="score">0</div>
  <button onclick="clickScore()">TAP</button>
  <button class="upgrade" onclick="buyUpgrade()">+1 per click (10)</button>
</div>

<script>
  let score = 0;
  let perClick = 1;
  let upgradeCost = 10;

  function updateUI() {
    document.getElementById("score").innerText = score;
    document.querySelector(".upgrade").innerText =
      "+" + perClick + " per click (" + upgradeCost + ")";
  }

  function clickScore() {
    score += perClick;
    updateUI();
  }

  function buyUpgrade() {
    if (score >= upgradeCost) {
      score -= upgradeCost;
      perClick++;
      upgradeCost = Math.floor(upgradeCost * 1.5);
      updateUI();
    }
  }

  updateUI();
</script>

</body>
</html>
