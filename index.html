<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Canvas Editor</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #111;
        font-family: sans-serif;
    }

    canvas {
        background: #222;
        touch-action: none;
        display: block;
    }

    .toolbar {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: #000a;
        display: flex;
        gap: 10px;
        padding: 10px;
        justify-content: center;
    }

    button, input {
        padding: 10px;
        font-size: 16px;
    }

    /* Landscape (horizontal) optimiert */
    @media (orientation: landscape) {
        .toolbar {
            flex-direction: column;
            width: 120px;
            height: 100%;
            right: 0;
            top: 0;
            bottom: auto;
        }
    }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="toolbar">
    <input type="file" id="imgInput">
    <button onclick="addBox()">⬛ Box</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let objects = [];
let selected = null;
let offsetX = 0;
let offsetY = 0;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let obj of objects) {
        if (obj.type === "rect") {
            ctx.fillStyle = obj.color;
            ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
        } else if (obj.type === "img") {
            ctx.drawImage(obj.img, obj.x, obj.y, obj.w, obj.h);
        }
    }
}

function addBox() {
    objects.push({
        type: "rect",
        x: 100,
        y: 100,
        w: 100,
        h: 100,
        color: "red"
    });
    draw();
}

document.getElementById("imgInput").addEventListener("change", e => {
    const file = e.target.files[0];
    const img = new Image();
    img.onload = () => {
        objects.push({
            type: "img",
            img: img,
            x: 50,
            y: 50,
            w: 150,
            h: 150
        });
        draw();
    };
    img.src = URL.createObjectURL(file);
});

function getTouchPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return {
        x: t.clientX - rect.left,
        y: t.clientY - rect.top
    };
}

canvas.addEventListener("touchstart", start);
canvas.addEventListener("touchmove", move);
canvas.addEventListener("touchend", () => selected = null);

canvas.addEventListener("mousedown", start);
canvas.addEventListener("mousemove", move);
canvas.addEventListener("mouseup", () => selected = null);

function start(e) {
    const pos = getTouchPos(e);
    for (let i = objects.length - 1; i >= 0; i--) {
        let o = objects[i];
        if (pos.x > o.x && pos.x < o.x + o.w &&
            pos.y > o.y && pos.y < o.y + o.h) {
            selected = o;
            offsetX = pos.x - o.x;
            offsetY = pos.y - o.y;
            break;
        }
    }
}

function move(e) {
    if (!selected) return;
    const pos = getTouchPos(e);
    selected.x = pos.x - offsetX;
    selected.y = pos.y - offsetY;
    draw();
}

draw();
</script>

</body>
</html>
